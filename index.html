<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Julie Maps" />
    <meta name="theme-color" content="#0b0b0f" />
    <title>Julie Maps</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Navigation</p>
        <h1>Julie Maps</h1>
        <p class="subhead">Tap a destination to open turn-by-turn directions in Apple Maps.</p>
      </header>

      <section id="groups" class="group-list" aria-label="Saved destinations"></section>
    </main>

    <template id="group-template">
      <section class="group">
        <div class="group-heading">
          <h2></h2>
        </div>
        <div class="button-grid"></div>
      </section>
    </template>

    <template id="button-template">
      <a class="destination-button" rel="noopener noreferrer">
        <span class="destination-name"></span>
        <span class="destination-address"></span>
      </a>
    </template>

    <script src="script.js"></script>
  </body>
</html>
